<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DR AFRID Herbal Home - Natural Herbal Solutions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{overflow-x:hidden;color:#333;min-width:320px;}
        a{text-decoration:none;color:inherit;}
        ul{list-style:none;}
        img{max-width:100%;display:block;}
        .container{width:90%;max-width:1200px;margin:0 auto;}

        /* ── Top Bar ── */
        .top-bar{background:#2d5a1b;color:white;padding:7px 0;font-size:12px;}
        .top-bar-inner{display:flex;justify-content:space-between;align-items:center;width:90%;margin:0 auto;gap:6px;}
        .tb-contacts{display:flex;gap:14px;flex-wrap:nowrap;overflow-x:auto;white-space:nowrap;scrollbar-width:none;}
        .tb-contacts::-webkit-scrollbar{display:none;}
        .tb-item{display:flex;align-items:center;gap:5px;white-space:nowrap;}
        .tb-item i{color:#a8d96c;font-size:11px;flex-shrink:0;}
        .tb-item .tb-hide{display:inline;}
        .tb-social{display:flex;gap:10px;flex-shrink:0;}
        .tb-social a{color:white;font-size:13px;transition:color .3s;}
        .tb-social a:hover{color:#a8d96c;}

        /* ── Header ── */
        header{position:absolute;width:100%;z-index:1000;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.15);transition:background .3s,padding .3s;}
        header.scrolled{position:fixed;background:#162520;border-bottom:none;box-shadow:0 2px 20px rgba(0,0,0,.3);padding:10px 0;}
        .hdr{display:flex;align-items:center;justify-content:space-between;width:90%;margin:0 auto;}
        .logo img{height:42px;width:auto;object-fit:contain;}
        .nav-links{display:flex;gap:26px;list-style:none;}
        .nav-links a{color:rgba(255,255,255,.9);font-weight:500;font-size:14px;padding:5px 0;transition:color .3s;position:relative;}
        .nav-links a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:2px;background:#8bc34a;transition:width .3s;}
        .nav-links a:hover::after,.nav-links li:first-child a::after{width:100%;}
        .nav-links a:hover,.nav-links li:first-child a{color:#8bc34a;}
        .nav-order-btn{background:#8bc34a!important;color:white!important;padding:8px 18px!important;border-radius:4px;font-weight:600!important;}
        .nav-order-btn::after{display:none!important;}
        .menu-toggle{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;z-index:1100;}
        .menu-toggle span{display:block;width:25px;height:3px;background:white;border-radius:3px;transition:all .35s;transform-origin:center;}
        .menu-toggle.open span:nth-child(1){transform:translateY(8px) rotate(45deg);}
        .menu-toggle.open span:nth-child(2){opacity:0;}
        .menu-toggle.open span:nth-child(3){transform:translateY(-8px) rotate(-45deg);}
        .mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1050;opacity:0;transition:opacity .3s;}
        .mob-overlay.open{opacity:1;}
        .mob-drawer{position:fixed;top:0;right:0;height:100%;width:min(80vw,290px);background:#162520;z-index:1100;padding:68px 26px 26px;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;}
