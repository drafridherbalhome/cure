<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - DR AFRID Herbal Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{overflow-x:hidden;color:#333;background:#fff;}
        a{text-decoration:none;color:inherit;}
        ul{list-style:none;}
        .container{width:90%;max-width:1200px;margin:0 auto;}

        /* Top Bar */
        .top-bar{background:#2d5a1b;color:white;padding:7px 0;font-size:13px;}
        .top-bar-content{display:flex;justify-content:space-between;align-items:center;width:90%;margin:0 auto;flex-wrap:wrap;gap:4px 12px;}
        .contact-info-topbar{display:flex;gap:16px;flex-wrap:wrap;}
        .contact-info-item{display:flex;align-items:center;gap:6px;}
        .contact-info-item i{font-size:12px;color:#a8d96c;}
        .top-bar-social{display:flex;gap:10px;}
        .top-bar-social a{color:white;font-size:13px;transition:color .3s;}
        .top-bar-social a:hover{color:#a8d96c;}

        /* Header */
        header{background:#162520;padding:14px 0;position:sticky;top:0;z-index:1000;box-shadow:0 2px 20px rgba(0,0,0,.2);}
        .header-container{display:flex;align-items:center;justify-content:space-between;width:90%;margin:0 auto;}
        .logo img{height:44px;width:auto;object-fit:contain;}
        .nav-links{display:flex;gap:28px;list-style:none;}
        .nav-links a{color:rgba(255,255,255,.9);font-weight:500;font-size:14.5px;padding:5px 0;transition:color .3s;position:relative;}
        .nav-links a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:2px;background:#8bc34a;transition:width .3s;}
        .nav-links a:hover::after,.nav-links li:nth-child(2) a::after{width:100%;}
        .nav-links a:hover,.nav-links li:nth-child(2) a{color:#8bc34a;}
        .nav-order-btn{background:#8bc34a;color:white!important;padding:8px 20px!important;border-radius:4px;font-weight:600!important;}
        .nav-order-btn::after{display:none!important;}
        .menu-toggle{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;z-index:1100;}
        .menu-toggle span{display:block;width:26px;height:3px;background:white;border-radius:3px;transition:all .35s;transform-origin:center;}
        .menu-toggle.open span:nth-child(1){transform:translateY(8px) rotate(45deg);}
        .menu-toggle.open span:nth-child(2){opacity:0;}
        .menu-toggle.open span:nth-child(3){transform:translateY(-8px) rotate(-45deg);}
        .mobile-nav-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1050;opacity:0;transition:opacity .3s;}
        .mobile-nav-overlay.open{opacity:1;}
        .mobile-nav-drawer{position:fixed;top:0;right:0;height:100%;width:min(80vw,300px);background:#162520;z-index:1100;padding:70px 28px 28px;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;}
        .mobile-nav-drawer.open{transform:translateX(0);}
        .mobile-nav-links{display:flex;flex-direction:column;}
        .mobile-nav-links li{border-bottom:1px solid rgba(255,255,255,.07);}
        .mobile-nav-links a{display:block;color:white;font-size:15px;font-weight:500;padding:13px 0;transition:color .3s,padding-left .3s;}
